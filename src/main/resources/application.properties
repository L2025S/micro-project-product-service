spring.application.name=micro-project-product-service



#server
server.port=${PORT:8081}

#Auth-serverns URL(används för JWKS)
app.auth-server-url=${AUTH_SERVER_URL:http://localhost:8080}


#postgreSQL database
spring.datasource.url=${PRODUCT_DB_URL}
spring.datasource.username=${PRODUCT_DB_USERNAME}
spring.datasource.password=${PRODUCT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring data jpa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true




